auths:
  public_v2:
    community: public
    version: 2

modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31
    version: 2
    auth: public_v2
    lookups:
      - source_indexes: [ifIndex]
        lookup: ifAlias
      - source_indexes: [ifIndex]
        lookup: ifDescr
      - source_indexes: [ifIndex]
        lookup: ifName
    overrides:
      ifAlias:
        ignore: true
      ifDescr:
        ignore: true
      ifName:
        ignore: true
      ifType:
        type: EnumAsInfo

  system:
    walk:
      - 1.3.6.1.2.1.1
      - 1.3.6.1.2.1.25
    version: 2
    auth: public_v2
    lookups:
      - source_indexes: [hrStorageIndex]
        lookup: hrStorageDescr
      - source_indexes: [hrDeviceIndex]
        lookup: hrDeviceDescr
    overrides:
      hrStorageDescr:
        ignore: true
      hrDeviceDescr:
        ignore: true