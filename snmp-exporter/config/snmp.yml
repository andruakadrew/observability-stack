auths:
  public_v2:
    community: public
    version: 2

modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31
    metrics:
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: Number of octets received - 1.3.6.1.2.1.2.2.1.10
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: Number of octets transmitted - 1.3.6.1.2.1.2.2.1.16
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        help: Number of inbound packets that contained errors - 1.3.6.1.2.1.2.2.1.14
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        help: Number of outbound packets that contained errors - 1.3.6.1.2.1.2.2.1.20
        indexes:
          - labelname: ifIndex
            type: gauge

  system:
    walk:
      - 1.3.6.1.2.1.1
      - 1.3.6.1.2.1.25
    metrics:
      - name: hrProcessorLoad
        oid: 1.3.6.1.2.1.25.3.3.1.2
        type: gauge
        help: The average, over the last minute, of the percentage of time that this processor was not idle - 1.3.6.1.2.1.25.3.3.1.2
        indexes:
          - labelname: hrDeviceIndex
            type: gauge
      - name: hrSystemUptime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: The time since the network management portion of the system was last re-initialized - 1.3.6.1.2.1.1.3